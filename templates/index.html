<!DOCTYPE html>
<html>
<head>
    <title>Email Sender</title>
</head>
<body>

    <h2>Send Personalized Emails</h2>

    <form action="/send" method="post" enctype="multipart/form-data">
        
        <label>Upload CSV File:</label><br>
        <input type="file" name="file" required><br><br>

        <label>Write Email Template:</label><br>
        <textarea name="template" rows="12" cols="60">
            Hi {{name}},
            I hope you are doing well.
            I saw your work at {{company}} as a {{role}}.
            ould love to connect with you.
            Best regards,
            Your Name
        </textarea><br><br>

        <button type="submit">Send Emails</button>

    </form>

</body>
</html>
