<!DOCTYPE html>
<html>
<head>
    <title>Email Sender</title>
</head>
<body>

    <h2>📧 Personalized Email Sender</h2>

    <form action="/send" method="post" enctype="multipart/form-data">

        <!-- Upload CSV -->
        <label>Upload CSV File:</label><br>
        <input type="file" name="file" required><br><br>

        <!-- Email Template -->
        <label>Email Template:</label><br>
        <textarea name="template" rows="12" cols="60">{{ template }}</textarea><br><br>

        <!-- Submit -->
        <button type="submit">Send Emails</button>

    </form>

</body>
</html>
